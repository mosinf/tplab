            Configuration initiale
          </div>
          <h1 className="font-display text-4xl" style={{ color: C.ink }}>
            Connecter <span style={{ fontStyle: "italic" }}>TP Lab</span> à Supabase
          </h1>
          <p className="text-sm mt-2" style={{ color: C.inkSoft }}>
            Une base de données PostgreSQL gratuite et hébergée. Vos données y sont stockées de façon
            permanente et synchronisées en temps réel entre tous les enseignants connectés.
          </p>
        </div>

        <section className="p-6 space-y-3" style={{ background: C.paper, border: `1px solid ${C.rule}` }}>
          <h2 className="font-display text-lg" style={{ color: C.ink }}>Étape 1 — Créer un projet Supabase</h2>
          <ol className="text-sm space-y-2 pl-5 list-decimal" style={{ color: C.inkSoft }}>
            <li>Rendez-vous sur <a href="https://supabase.com" target="_blank" rel="noopener noreferrer" style={{ color: C.accent, textDecoration: "underline" }}>supabase.com</a> et créez un compte (l'offre gratuite suffit largement)</li>
            <li>Cliquez sur <strong>New project</strong>, donnez-lui un nom et choisissez un mot de passe (conservez-le)</li>
            <li>Sélectionnez la région la plus proche (ex. <em>West Europe</em> ou <em>Central Europe</em>)</li>
            <li>Attendez ~2 minutes que le projet soit prêt</li>
          </ol>
        </section>

        <section className="p-6 space-y-3" style={{ background: C.paper, border: `1px solid ${C.rule}` }}>
          <div className="flex items-center justify-between">
            <h2 className="font-display text-lg" style={{ color: C.ink }}>Étape 2 — Créer les tables</h2>
            <button onClick={copySql}
              className="text-xs px-3 py-1.5 hover:opacity-80"
              style={{ background: C.bg, border: `1px solid ${C.rule}`, color: C.ink }}>
              {copied ? "Copié ✓" : "Copier le SQL"}
            </button>
          </div>
          <p className="text-sm" style={{ color: C.inkSoft }}>
            Dans Supabase, ouvrez <strong>SQL Editor</strong> (menu de gauche), cliquez <strong>New query</strong>,
            collez le script ci-dessous, puis <strong>Run</strong>.
          </p>
          <pre className="text-xs p-3 overflow-auto" style={{ background: C.bg, border: `1px solid ${C.rule}`, color: C.ink, maxHeight: 200, fontFamily: "ui-monospace, monospace" }}>{SUPABASE_SQL}</pre>
        </section>

        <section className="p-6 space-y-4" style={{ background: C.paper, border: `1px solid ${C.rule}` }}>
          <h2 className="font-display text-lg" style={{ color: C.ink }}>Étape 3 — Vos clés de connexion</h2>
          <p className="text-sm" style={{ color: C.inkSoft }}>
            Dans Supabase, ouvrez <strong>Project Settings → Data API</strong>. Vous y trouverez :
          </p>
          <div>
            <label className="text-xs uppercase tracking-wider mb-2 block" style={{ color: C.inkMuted }}>
              URL du projet
            </label>
            <input value={url} onChange={(e) => setUrl(e.target.value)}
              placeholder="https://xxxxxxxxxxxx.supabase.co"
              className="w-full px-3 py-2 text-sm outline-none"
              style={{ background: C.bg, border: `1px solid ${C.rule}`, color: C.ink, fontFamily: "ui-monospace, monospace" }} />
          </div>
          <div>
            <label className="text-xs uppercase tracking-wider mb-2 block" style={{ color: C.inkMuted }}>
              Clé publique « anon » (anon public key)
            </label>
            <textarea value={key} onChange={(e) => setKey(e.target.value)}
              placeholder="eyJhbGciOi..."
              rows={3}
              className="w-full px-3 py-2 text-xs outline-none"
              style={{ background: C.bg, border: `1px solid ${C.rule}`, color: C.ink, fontFamily: "ui-monospace, monospace" }} />
          </div>

          {error && (
            <div className="p-3 text-xs flex items-start gap-2"
              style={{ background: C.absentSoft, border: `1px solid ${C.absent}`, color: C.absent }}>
              <span>✗</span><span>{error}</span>
            </div>
          )}

          <button onClick={handleConnect}
            disabled={!url.trim() || !key.trim() || testing}
            className="w-full px-4 py-3 text-sm font-medium text-white hover:opacity-90 transition disabled:opacity-40"
            style={{ background: C.accent }}>
            {testing ? "Test de connexion…" : "Se connecter à Supabase"}
          </button>
        </section>

        <div className="text-xs italic text-center" style={{ color: C.inkMuted }}>
          La clé « anon » est conçue pour être publique — elle est protégée par les règles RLS de votre base.<br />
          Vos identifiants sont stockés dans ce navigateur uniquement, jamais transmis ailleurs.
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   COMPONENT — ConnectionBadge (small status pill in header)
   ============================================================ */
function ConnectionBadge({ status }) {
  const map = {
    connected: { bg: C.presentSoft, border: C.present, color: C.present, label: "Connecté", Icon: Cloud },
    syncing:   { bg: C.warnSoft,    border: C.warn,    color: C.warn,    label: "Synchronisation…", Icon: Cloud },
    offline:   { bg: C.absentSoft,  border: C.absent,  color: C.absent,  label: "Hors ligne", Icon: CloudOff },
  };
  const m = map[status] || map.connected;
  const Icon = m.Icon;
  return (
    <div className="hidden sm:flex items-center gap-1.5 px-2 py-1 text-[10px]"
      style={{ background: m.bg, border: `1px solid ${m.border}`, color: m.color }}>
      <Icon size={11} /> {m.label}
    </div>
  );
}

/* ============================================================
   ROOT APP — Supabase-backed
   ============================================================ */
function App() {
  const [config, setConfig] = useState({ url: null, key: null, ready: false, embedded: false });
  const [loaded, setLoaded] = useState(false);
  const [loadError, setLoadError] = useState(null);
  const [connStatus, setConnStatus] = useState("syncing");
  const [teacher, setTeacher] = useState(null);
  const [teachers, setTeachers] = useState([]);
  const [sessions, setSessions] = useState([]);
  const [students, setStudents] = useState({});
  const [view, setView] = useState("dashboard");
  const [selectedSessionId, setSelectedSessionId] = useState(null);
  const [draftSession, setDraftSession] = useState(null);

  const clientRef = useRef(null);
  const channelRef = useRef(null);

  // Inject font CSS once
  useEffect(() => {
    const style = document.createElement("style");
    style.innerHTML = fontFace;
    document.head.appendChild(style);
    return () => { document.head.removeChild(style); };
  }, []);

  // Check for saved Supabase config
  useEffect(() => {
    // Priority order:
    //   1. Embedded credentials (window.TPLAB_SUPABASE_URL/_KEY) — set
    //      by the deploy admin at the top of the HTML file.
    //   2. localStorage — set via the in-app SetupScreen.
    const embeddedUrl = (typeof window !== "undefined" && window.TPLAB_SUPABASE_URL) || "";
    const embeddedKey = (typeof window !== "undefined" && window.TPLAB_SUPABASE_KEY) || "";
    const url = embeddedUrl || localStorage.getItem(KEY_CFG_URL);
    const key = embeddedKey || localStorage.getItem(KEY_CFG_KEY);
    if (url && key && window.supabase) {
      try {
        clientRef.current = window.supabase.createClient(url, key);
        setConfig({ url, key, ready: true, embedded: !!embeddedUrl });
      } catch (e) {
        setLoadError("Configuration invalide : " + e.message);
      }
    }
  }, []);

  // Configure new connection
  async function configureSupabase(url, key) {
    if (!window.supabase) throw new Error("Bibliothèque Supabase non chargée (vérifiez votre connexion internet).");
    let client;
    try {
      client = window.supabase.createClient(url, key);
    } catch (e) {
      throw new Error("URL ou clé invalide : " + e.message);
    }
    // Quick test: probe the students table
    const { error } = await client.from("students").select("id").limit(1);
    if (error) {
      let msg = error.message;
      if (msg.includes("does not exist") || msg.includes("relation")) {
        msg = "La table 'students' n'existe pas. Avez-vous bien exécuté le script SQL de l'étape 2 ?";
      } else if (msg.toLowerCase().includes("invalid api key") || msg.toLowerCase().includes("jwt")) {
        msg = "Clé API invalide. Vérifiez la clé 'anon public' dans Project Settings → API.";
      }
      throw new Error(msg);
    }
    localStorage.setItem(KEY_CFG_URL, url);
    localStorage.setItem(KEY_CFG_KEY, key);
    clientRef.current = client;
    setConfig({ url, key, ready: true, embedded: false });
  }

  function clearConfig() {
    if (config.embedded) {
      window.alert("Cette installation utilise une configuration intégrée par l'administrateur du déploiement. La connexion ne peut pas être modifiée depuis l'interface.");
      return;
    }
    if (!window.confirm("Se déconnecter de Supabase et revenir à l'écran de configuration ?")) return;
    if (channelRef.current && clientRef.current) {
      try { clientRef.current.removeChannel(channelRef.current); } catch {}
    }
    localStorage.removeItem(KEY_CFG_URL);
    localStorage.removeItem(KEY_CFG_KEY);
    localStorage.removeItem(KEY_CURRENT);
    clientRef.current = null;
    channelRef.current = null;
    setConfig({ url: null, key: null, ready: false, embedded: false });
    setLoaded(false);
    setTeacher(null);
    setStudents({});
    setSessions([]);
    setTeachers([]);
  }

  // Initial load + seed
  useEffect(() => {
    if (!config.ready) return;
    let cancelled = false;
    (async () => {
      setConnStatus("syncing");
      try {
        const sb = clientRef.current;
        const [stuRes, sesRes, teaRes] = await Promise.all([
          sb.from("students").select("id, group_id, name, position").order("group_id").order("position"),
          sb.from("sessions").select("*").order("date"),
          sb.from("teachers").select("name"),
        ]);
        if (stuRes.error) throw stuRes.error;
        if (sesRes.error) throw sesRes.error;
        if (teaRes.error) throw teaRes.error;
        if (cancelled) return;

        let studentsMap = studentsRowsToMap(stuRes.data);

        // Seed if no students exist yet
        if (Object.keys(studentsMap).length === 0) {
          const seedData = seedToStudents(SEED_STUDENTS);
          const rows = [];
          Object.keys(seedData).forEach((g) => {
            seedData[g].forEach((s, i) => {
              rows.push({ id: s.id, group_id: Number(g), name: s.name, position: i });
            });
          });
          // Insert in chunks of 200 to avoid hitting API limits
          for (let i = 0; i < rows.length; i += 200) {
            const chunk = rows.slice(i, i + 200);
            const { error } = await sb.from("students").insert(chunk);
            if (error) throw new Error("Erreur de seeding : " + error.message);
          }
          studentsMap = seedData;
        }

        const sessionsList = (sesRes.data || []).map(sessionFromRow);
        const teachersList = (teaRes.data || []).map((t) => t.name);

        if (cancelled) return;
        setStudents(studentsMap);
        setSessions(sessionsList);
        setTeachers(teachersList);

        // Load local teacher choice
        const t = localStorage.getItem(KEY_CURRENT);
        if (t && teachersList.includes(t)) setTeacher(t);

        setLoaded(true);
        setConnStatus("connected");
      } catch (e) {
        if (!cancelled) {
          setLoadError(e.message || String(e));
          setConnStatus("offline");
        }
      }
    })();
    return () => { cancelled = true; };
  }, [config.ready]);

  // Real-time subscriptions
  useEffect(() => {
    if (!config.ready || !loaded) return;
    const sb = clientRef.current;
    const channel = sb.channel("tplab-realtime")
      .on("postgres_changes", { event: "*", schema: "public", table: "sessions" }, (payload) => {
        if (payload.eventType === "DELETE") {
          setSessions((s) => s.filter((x) => x.id !== payload.old.id));
        } else {
          const sess = sessionFromRow(payload.new);
          setSessions((s) => {
            const idx = s.findIndex((x) => x.id === sess.id);
            if (idx === -1) return [...s, sess];
            return s.map((x) => x.id === sess.id ? sess : x);
          });
        }
      })
      .on("postgres_changes", { event: "*", schema: "public", table: "students" }, (payload) => {
        setStudents((prev) => {
          const next = { ...prev };
          if (payload.eventType === "DELETE") {
            const g = payload.old.group_id;
            if (next[g]) {
              next[g] = next[g].filter((s) => s.id !== payload.old.id);
              if (next[g].length === 0) delete next[g];
            }
            return next;
          }
          const g = payload.new.group_id;
          if (!next[g]) next[g] = [];
          const stu = { id: payload.new.id, name: payload.new.name };
          const idx = next[g].findIndex((s) => s.id === stu.id);
          next[g] = idx === -1 ? [...next[g], stu] : next[g].map((s) => s.id === stu.id ? stu : s);
          return next;
        });
      })
      .on("postgres_changes", { event: "*", schema: "public", table: "teachers" }, (payload) => {
        if (payload.eventType === "DELETE") {
          setTeachers((t) => t.filter((x) => x !== payload.old.name));
        } else if (payload.new && payload.new.name) {
          setTeachers((t) => t.includes(payload.new.name) ? t : [...t, payload.new.name]);
        }
      })
      .subscribe((status) => {
        if (status === "SUBSCRIBED") setConnStatus("connected");
        else if (status === "CHANNEL_ERROR" || status === "TIMED_OUT") setConnStatus("offline");
      });
    channelRef.current = channel;
    return () => {
      try { sb.removeChannel(channel); } catch {}
      channelRef.current = null;
    };
  }, [config.ready, loaded]);

  async function pickTeacher(name) {
    setTeacher(name);
    localStorage.setItem(KEY_CURRENT, name);
  }

  async function addTeacher(name) {
    if (!teachers.includes(name)) {
      const { error } = await clientRef.current.from("teachers").upsert({ name });
      if (error) { alert("Erreur : " + error.message); return; }
      setTeachers((t) => t.includes(name) ? t : [...t, name]);
    }
    await pickTeacher(name);
  }

  // ---- Student / group management API (Supabase-backed) ----
  async function addStudents(groupId, names) {
    const next = { ...students };
    const arr = [...(next[groupId] || [])];
    let n = nextStudentNumber(next, groupId);
    const added = [];
    const rejected = [];
    const working = { ...next, [groupId]: arr };
    const dbRows = [];
    let position = arr.length;
    for (const raw of names) {
      const name = String(raw).trim();
      if (!name) continue;
      const conflict = findStudentByName(working, name);
      if (conflict) { rejected.push({ name, conflictsWith: conflict }); continue; }
      const id = `G${groupId}-${n}`;
      arr.push({ id, name });
      added.push({ id, name });
      dbRows.push({ id, group_id: Number(groupId), name, position });
      n += 1;
      position += 1;
      working[groupId] = arr;
    }
    if (dbRows.length) {
      const { error } = await clientRef.current.from("students").insert(dbRows);
      if (error) { alert("Sauvegarde échouée : " + error.message); return { added: [], rejected: [...rejected, ...added.map((a) => ({ name: a.name, conflictsWith: { group: groupId, id: a.id, name: a.name }}))] }; }
      next[groupId] = arr;
      setStudents(next);
    }
    return { added, rejected };
  }

  async function updateStudent(groupId, sid, newName) {
    const trimmed = String(newName).trim();
    if (!trimmed) return { ok: false };
    const conflict = findStudentByName(students, trimmed, sid);
    if (conflict) return { ok: false, conflict };
    const { error } = await clientRef.current.from("students").update({ name: trimmed }).eq("id", sid);
    if (error) { alert("Erreur : " + error.message); return { ok: false }; }
    const next = { ...students };
    next[groupId] = (next[groupId] || []).map((s) => s.id === sid ? { ...s, name: trimmed } : s);
    setStudents(next);
    return { ok: true };
  }

  async function removeStudent(groupId, sid) {
    const { error } = await clientRef.current.from("students").delete().eq("id", sid);
    if (error) { alert("Erreur : " + error.message); return; }
    const next = { ...students };
    next[groupId] = (next[groupId] || []).filter((s) => s.id !== sid);
    if (next[groupId].length === 0) delete next[groupId];
    setStudents(next);
  }

  async function addGroup(groupId, names) {
    if (students[groupId]) return { added: [], rejected: [] };
    const next = { ...students, [groupId]: [] };
    const arr = next[groupId];
    const added = [];
    const rejected = [];
    const dbRows = [];
    let n = 1;
    for (const raw of names) {
      const name = String(raw).trim();
      if (!name) continue;
      const conflict = findStudentByName(next, name);
      if (conflict) { rejected.push({ name, conflictsWith: conflict }); continue; }
      const id = `G${groupId}-${n}`;
      arr.push({ id, name });
      added.push({ id, name });
      dbRows.push({ id, group_id: Number(groupId), name, position: n - 1 });
      n += 1;
    }
    if (dbRows.length) {
      const { error } = await clientRef.current.from("students").insert(dbRows);
      if (error) { alert("Erreur : " + error.message); return { added: [], rejected: [] }; }
    }
    setStudents(next);
    return { added, rejected };
  }

  async function removeGroup(groupId) {
    const { error } = await clientRef.current.from("students").delete().eq("group_id", Number(groupId));
    if (error) { alert("Erreur : " + error.message); return; }
    const next = { ...students };
    delete next[groupId];
    setStudents(next);
  }

  // ---- Backup / restore ----
  function exportBackup() {
    const payload = {
      app: "TP Lab", version: 1, exported_at: new Date().toISOString(),
      data: { students, sessions, teachers },
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const stamp = new Date().toISOString().replace(/[:.]/g, "-").slice(0, 16);
    a.href = url;
    a.download = `tplab_sauvegarde_${stamp}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  async function restoreBackup(jsonText) {
    let parsed;
    try { parsed = JSON.parse(jsonText); } catch { throw new Error("Fichier JSON invalide."); }
    const d = parsed?.data;
    if (!d || !d.students || !Array.isArray(d.sessions) || !Array.isArray(d.teachers))
      throw new Error("Format invalide.");

    const sb = clientRef.current;
    // Wipe everything (id != '' matches all rows)
    const wipes = await Promise.all([
      sb.from("sessions").delete().neq("id", "__never__"),
      sb.from("students").delete().neq("id", "__never__"),
      sb.from("teachers").delete().neq("name", "__never__"),
    ]);
    for (const r of wipes) if (r.error) throw new Error(r.error.message);

    // Insert
    const stuRows = [];
    Object.keys(d.students).forEach((g) => {
      d.students[g].forEach((s, i) => {
        stuRows.push({ id: s.id, group_id: Number(g), name: s.name, position: i });
      });
    });
    for (let i = 0; i < stuRows.length; i += 200) {
      const chunk = stuRows.slice(i, i + 200);
      const { error } = await sb.from("students").insert(chunk);
      if (error) throw new Error(error.message);
    }

    if (d.sessions.length) {
      const sesRows = d.sessions.map(sessionToRow);
      const { error } = await sb.from("sessions").upsert(sesRows);
      if (error) throw new Error(error.message);
    }
    if (d.teachers.length) {
      const teaRows = d.teachers.map((name) => ({ name }));
      const { error } = await sb.from("teachers").upsert(teaRows);
      if (error) throw new Error(error.message);
    }

    setStudents(d.students);
    setSessions(d.sessions);
    setTeachers(d.teachers);

    return {
      groups: Object.keys(d.students).length,
      students: Object.values(d.students).reduce((s, l) => s + l.length, 0),
      sessions: d.sessions.length,
      teachers: d.teachers.length,
      exported_at: parsed.exported_at,
    };
  }

  function startSession(meta) {
    const draft = {
      id: newSessionId(), ...meta, teacher,
      attendance: emptyAttendance(students, meta.groups),
      createdAt: 0, updatedAt: 0,
    };
    setDraftSession(draft);
    setSelectedSessionId(draft.id);
    setView("session");
  }

  async function saveSession(s) {
    const now = Date.now();
    const toSave = { ...s, createdAt: s.createdAt || now, updatedAt: now };
    const { error } = await clientRef.current.from("sessions").upsert(sessionToRow(toSave));
    if (error) throw new Error("Sauvegarde échouée : " + error.message);
    setSessions((prev) => {
      const idx = prev.findIndex((x) => x.id === toSave.id);
      if (idx === -1) return [...prev, toSave];
      return prev.map((x) => x.id === toSave.id ? toSave : x);
    });
    setDraftSession(null);
  }

  async function deleteSession(id) {
    if (!window.confirm("Supprimer définitivement cette séance ?")) return;
    const { error } = await clientRef.current.from("sessions").delete().eq("id", id);
    if (error) { alert("Erreur : " + error.message); return; }
    setSessions((prev) => prev.filter((x) => x.id !== id));
    setSelectedSessionId(null);
    setDraftSession(null);
    setView("sessions");
  }

  function openSession(id) {
    setSelectedSessionId(id);
    setDraftSession(null);
    setView("session");
  }

  // ----- RENDER -----
  if (!config.ready) {
    return (
      <div className="font-body">
        <style dangerouslySetInnerHTML={{ __html: fontFace }} />
        <SetupScreen onConfigure={configureSupabase} />
      </div>
    );
  }

  if (loadError) {
    return (
      <div className="min-h-screen flex items-center justify-center font-body p-6" style={{ background: C.bg }}>
        <div className="p-6 max-w-lg" style={{ background: C.paper, border: `1px solid ${C.absent}` }}>
          <h2 className="font-display text-xl" style={{ color: C.absent }}>Erreur de connexion</h2>
          <p className="text-sm mt-2" style={{ color: C.ink }}>{loadError}</p>
          <button onClick={clearConfig} className="mt-4 px-4 py-2 text-sm text-white"
            style={{ background: C.accent }}>
            Reconfigurer la connexion
          </button>
        </div>
      </div>
    );
  }

  if (!loaded) {
    return (
      <div className="min-h-screen flex items-center justify-center font-body"
        style={{ background: C.bg, color: C.inkMuted }}>
        Connexion à la base de données…
      </div>
    );
  }

  const ctxValue = {
    students, addStudents, updateStudent, removeStudent, addGroup, removeGroup,
  };

  if (!teacher) {
    return (
      <StudentsCtx.Provider value={ctxValue}>
        <div className="font-body">
          <style dangerouslySetInnerHTML={{ __html: fontFace }} />
          <TeacherGate teachers={teachers} onPick={pickTeacher} onAdd={addTeacher} />
        </div>
      </StudentsCtx.Provider>
    );
  }

  let content = null;
  if (view === "dashboard") {
    content = <Dashboard sessions={sessions} teacher={teacher}
      onOpenSchedule={() => setView("planning")} onOpenSession={openSession} />;
  } else if (view === "planning") {
    content = <Planning sessions={sessions}
      onStartSession={startSession} onOpenSession={openSession} />;
  } else if (view === "sessions") {
    content = <SessionsList sessions={sessions} onOpenSession={openSession} />;
  } else if (view === "groups") {
    content = <GroupsView sessions={sessions} />;
  } else if (view === "search") {
    content = <StudentSearch sessions={sessions} />;
  } else if (view === "exports") {
    content = <Exports sessions={sessions} onExportBackup={exportBackup} onRestoreBackup={restoreBackup} />;
  } else if (view === "session") {
    const sess = draftSession || sessions.find((s) => s.id === selectedSessionId);
    if (!sess) {
      content = <div className="text-sm" style={{ color: C.inkMuted }}>Séance introuvable.</div>;
    } else {
      content = <SessionEditor session={sess} teacher={teacher}
        onSave={saveSession} onDelete={() => deleteSession(sess.id)}
        onClose={() => { setView("sessions"); setDraftSession(null); }} />;
    }
  }

  return (
    <StudentsCtx.Provider value={ctxValue}>
      <div className="min-h-screen font-body" style={{ background: C.bg, color: C.ink }}>
        <style dangerouslySetInnerHTML={{ __html: fontFace }} />
        <header className="no-print" style={{ background: C.paper, borderBottom: `1px solid ${C.rule}` }}>
          <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between gap-3">
            <div className="flex items-center gap-3">
              <div className="w-9 h-9 flex items-center justify-center"
                style={{ background: C.ink, color: C.bg }}>
                <span className="font-display text-lg italic">L</span>
              </div>
              <div>
                <div className="font-display text-xl leading-none" style={{ color: C.ink }}>
                  TP <span style={{ fontStyle: "italic" }}>Lab</span>
                </div>
                <div className="text-[10px] uppercase tracking-[0.18em]" style={{ color: C.inkMuted }}>
                  IAP2201 · L1 MI
                </div>
              </div>
            </div>
            <div className="flex items-center gap-2">
              <ConnectionBadge status={connStatus} />
              <button onClick={clearConfig}
                className="hidden sm:flex items-center gap-1.5 px-2 py-2 text-xs hover:opacity-80"
                style={{ background: C.bg, border: `1px solid ${C.rule}`, color: C.inkSoft }}
                title="Reconfigurer Supabase">
                <Database size={13} />
              </button>
              <button onClick={() => setTeacher(null)}
                className="flex items-center gap-2 px-3 py-2 text-sm hover:opacity-80"
                style={{ background: C.bg, border: `1px solid ${C.rule}`, color: C.ink }}>
                <UserCircle2 size={16} />
                <span className="font-medium">{teacher}</span>
              </button>
            </div>
          </div>
          <nav className="max-w-7xl mx-auto px-6 flex gap-1 overflow-x-auto">
            {[
              { id: "dashboard", label: "Tableau de bord", icon: LayoutDashboard },
              { id: "planning", label: "Planning", icon: CalendarDays },
              { id: "sessions", label: "Séances", icon: ClipboardList },
              { id: "groups", label: "Groupes", icon: Users },
              { id: "search", label: "Recherche", icon: Search },
              { id: "exports", label: "Exports", icon: Download },
            ].map((t) => {
              const active = view === t.id;
              const Icon = t.icon;
              return (
                <button key={t.id} onClick={() => { setView(t.id); setSelectedSessionId(null); setDraftSession(null); }}
                  className="flex items-center gap-2 px-4 py-3 text-sm font-medium whitespace-nowrap transition"
                  style={{
                    color: active ? C.accent : C.inkSoft,
                    borderBottom: active ? `2px solid ${C.accent}` : "2px solid transparent",
                    marginBottom: -1,
                  }}>
                  <Icon size={15} />
                  {t.label}
                </button>
              );
            })}
          </nav>
        </header>
        <main className="max-w-7xl mx-auto px-6 py-8">
          {content}
        </main>
        <footer className="no-print max-w-7xl mx-auto px-6 py-6 text-xs flex justify-between flex-wrap gap-2"
          style={{ color: C.inkMuted, borderTop: `1px solid ${C.rule}` }}>
          <div>TP Lab · IAP2201 · Synchronisé en temps réel via Supabase</div>
          <div>UNA · UFR-SFA · 2025-2026</div>
        </footer>
      </div>
    </StudentsCtx.Provider>
  );
}


    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(App));
  </script>
</body>
</html>
