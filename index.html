// Convert seed (group → [name]) into runtime shape (group → [{id, name}])
function seedToStudents(seed) {
  const out = {};
  Object.keys(seed).forEach((g) => {
    out[g] = seed[g].map((name, i) => ({ id: `G${g}-${i + 1}`, name }));
  });
  return out;
}

function listGroups(students) {
  return Object.keys(students).map(Number).sort((a, b) => a - b);
}
function countTotal(students) {
  return Object.values(students).reduce((s, l) => s + l.length, 0);
}
function nextStudentNumber(students, groupId) {
  const arr = students[groupId] || [];
  const max = arr
    .map((s) => parseInt(String(s.id).split("-").pop(), 10))
    .filter((n) => !isNaN(n))
    .reduce((m, n) => Math.max(m, n), 0);
  return max + 1;
}
function nextGroupId(students) {
  const ids = listGroups(students);
  return ids.length ? Math.max(...ids) + 1 : 1;
}

// Normalize a student name for cross-group uniqueness checks:
// strip diacritics, lowercase, treat apostrophes/hyphens as spaces,
// remove other punctuation, collapse whitespace.
function normalizeName(name) {
  return String(name || "")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .toLowerCase()
    .replace(/['\u2019\-]/g, " ")
    .replace(/[^a-z0-9\s]/g, " ")
    .replace(/\s+/g, " ")
    .trim();
}

// Search every group for a student with the same normalized name.
// excludeId optionally skips that student id (useful when renaming).
function findStudentByName(students, name, excludeId = null) {
  const target = normalizeName(name);
  if (!target) return null;
  for (const g of Object.keys(students)) {
    for (const s of students[g] || []) {
      if (s.id === excludeId) continue;
      if (normalizeName(s.name) === target) {
        return { group: Number(g), id: s.id, name: s.name };
      }
    }
  }
  return null;
}

// Find all students that appear in more than one group.
// Returns: [{ key, occurrences: [{group, id, name}] }, ...]
function findCrossGroupDuplicates(students) {
  const buckets = new Map();
  Object.keys(students).forEach((g) => {
    (students[g] || []).forEach((s) => {
      const key = normalizeName(s.name);
      if (!key) return;
      if (!buckets.has(key)) buckets.set(key, []);
      buckets.get(key).push({ group: Number(g), id: s.id, name: s.name });
    });
  });
  const dups = [];
  for (const [key, occ] of buckets) {
    const groups = new Set(occ.map((o) => o.group));
    if (groups.size > 1) dups.push({ key, occurrences: occ });
  }
  return dups.sort((a, b) => a.occurrences[0].name.localeCompare(b.occurrences[0].name));
}

/* ============================================================
   SCHEDULE — Salle × Day × Slot → Group(s)
   Week 1 starts Mon 11 May 2026
   ============================================================ */
const DAYS = ["Lundi", "Mardi", "Mercredi", "Jeudi", "Vendredi"];
const SLOTS = ["08h00–10h30", "10h30–13h00", "13h00–15h30"];
const ROOMS = ["Salle 1", "Salle 2", "Salle 3", "Salle 4"];

// Each room has its 3 groups rotating across slots & days
const ROOM_GROUPS = {
  "Salle 1": [[1], [2], [3]],
  "Salle 2": [[4], [5], [6]],
  "Salle 3": [[7], [8], [9]],
  "Salle 4": [[10, 11], [12, 13], [14, 15]],
};

// Rotation pattern (slot, day) → which of the 3 groups (index 0-2)
// Reading the PDF: matrix is rotated diagonally
function getGroupForSlot(room, dayIdx, slotIdx) {
  // pattern from PDF (row=slot, col=day):
  // row 0: 0 1 2 0 1
  // row 1: 1 2 0 1 2
  // row 2: 2 0 1 2 0
  const idx = (slotIdx + dayIdx) % 3;
  return ROOM_GROUPS[room][idx];
}

function groupsLabel(groups) {
  return groups.map((g) => `G${g}`).join(" & ");
}

function dateForDayIndex(weekStart, dayIdx) {
  const d = new Date(weekStart);
  d.setDate(d.getDate() + dayIdx);
  return d;
}

function fmtDate(d) {
  return d.toLocaleDateString("fr-FR", {
    weekday: "long", day: "numeric", month: "long", year: "numeric",
  });
}

function fmtDateShort(d) {
  return d.toLocaleDateString("fr-FR", { day: "2-digit", month: "2-digit", year: "numeric" });
}

function isoDate(d) {
  return d.toISOString().slice(0, 10);
}

const WEEK_1_START = new Date("2026-05-11"); // Lundi 11 mai 2026

function getMondayOf(date) {
  const d = new Date(date);
  const day = d.getDay(); // 0=Sun..6=Sat
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  d.setHours(0, 0, 0, 0);
  return d;
}

                      style={{ color: C.inkMuted }}>
                      {d}
                      <div className="text-[10px] font-normal normal-case" style={{ color: C.inkMuted }}>
                        {fmtDateShort(dateForDayIndex(weekStart, i))}
                      </div>
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {SLOTS.map((slot, slotIdx) => (
                  <tr key={slot} style={{ borderTop: `1px solid ${C.ruleSoft}` }}>
                    <td className="px-4 py-3 text-xs num" style={{ color: C.inkSoft }}>{slot}</td>
                    {DAYS.map((d, dayIdx) => {
                      const groups = getGroupForSlot(room, dayIdx, slotIdx);
                      const existing = findSession(room, dayIdx, slotIdx);
                      const date = dateForDayIndex(weekStart, dayIdx);
                      return (
                        <td key={d} className="px-2 py-2 align-top">
                          <button
                            onClick={() => existing
                              ? onOpenSession(existing.id)
                              : onStartSession({
                                  date: isoDate(date), day: d, slot,
                                  room, groups,
                                })
                            }
                            className="w-full text-left px-3 py-2 transition hover:opacity-90"
                            style={{
                              background: existing ? C.accentSoft : C.bg,
                              border: `1px solid ${existing ? C.accent : C.rule}`,
                              color: C.ink,
                            }}>
                            <div className="font-medium text-sm">{groupsLabel(groups)}</div>
                            <div className="text-[10px] mt-1" style={{ color: existing ? C.accentDark : C.inkMuted }}>
                              {existing
                                ? `✓ ${Object.values(existing.attendance).filter((r) => r.present).length} présents`
                                : "À saisir"}
                            </div>
                          </button>
                        </td>
                      );
                    })}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      ))}
    </div>
  );
}

function SaveStatusBadge({ status }) {
  const map = {
    idle:   { bg: C.bg,         border: C.rule,    color: C.inkMuted, label: "—" },
    dirty:  { bg: C.warnSoft,   border: C.warn,    color: C.ink,      label: "Modifications en attente…" },
    saving: { bg: C.accentSoft, border: C.accent,  color: C.accentDark, label: "Enregistrement…" },
    saved:  { bg: C.presentSoft,border: C.present, color: C.present,  label: "Enregistré automatiquement ✓" },
    error:  { bg: C.absentSoft, border: C.absent,  color: C.absent,   label: "Échec — réessayez" },
  };
  const m = map[status] || map.idle;
  if (status === "idle") return null;
  return (
    <div className="px-3 py-2 text-xs flex items-center gap-1.5"
      style={{ background: m.bg, border: `1px solid ${m.border}`, color: m.color }}>
      {m.label}
    </div>
  );
}

function SessionEditor({ session, onSave, onDelete, onClose, teacher }) {
  const { students } = useStudents();
  const [working, setWorking] = useState(() => structuredClone(session));
  const [filter, setFilter] = useState("all"); // all | present | absent | unmarked
  const [search, setSearch] = useState("");
  const [saveStatus, setSaveStatus] = useState("idle"); // idle | dirty | saving | saved | error
  const isNew = !session.createdAt;

  // Refs to coordinate auto-save without re-running the effect for every change.
  const userTouched = useRef(false);
  const saveTimer = useRef(null);
  const latestWorking = useRef(working);
  const inFlight = useRef(false);

  // Keep latestWorking in sync without resetting timers
  useEffect(() => { latestWorking.current = working; }, [working]);

  // Sync attendance keys with current student roster (handles students added/removed since session creation)
  useEffect(() => {
    setWorking((w) => {
      const att = { ...w.attendance };
      let changed = false;
      w.groups.forEach((g) => {
        (students[g] || []).forEach((s) => {
          if (!att[s.id]) {
            att[s.id] = { present: false, grade: null, comment: "" };
            changed = true;
          }
        });
      });
      return changed ? { ...w, attendance: att } : w;
    });
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [students]);

  // Core save routine — used by both auto-save and the explicit button.
  async function doSave() {
    if (inFlight.current) return;
    inFlight.current = true;
    setSaveStatus("saving");
    const w = latestWorking.current;
    const now = Date.now();
    const toSave = {
      ...w,
      teacher: w.teacher || teacher,
      createdAt: w.createdAt || now,
      updatedAt: now,
    };
    try {
      await onSave(toSave);
      // Reflect persisted timestamps in the local working copy so isNew flips to false.
      setWorking((cur) => ({ ...cur, createdAt: toSave.createdAt, updatedAt: toSave.updatedAt }));
      setSaveStatus("saved");
    } catch (e) {
      setSaveStatus("error");
    } finally {
      inFlight.current = false;
    }
  }

  // Debounced auto-save — fires 700ms after the last user-driven change.
  useEffect(() => {
    if (!userTouched.current) return;
    setSaveStatus("dirty");
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => { doSave(); }, 700);
    return () => { if (saveTimer.current) clearTimeout(saveTimer.current); };
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [working]);

  // Stable ref to the latest flush function — used by unmount cleanup so a
  // teacher who navigates away mid-edit (logout, tab change, browser close)
  // doesn't lose their work.
  const flushRef = useRef(null);
  flushRef.current = async () => {
    if (saveTimer.current) clearTimeout(saveTimer.current);
    if (userTouched.current && !inFlight.current) await doSave();
  };

  // Flush on unmount (handles logout, tab change, etc.)
  useEffect(() => () => { flushRef.current && flushRef.current(); }, []);

  // Flush on tab hide or page close (extra safety for mobile/desktop closing)
  useEffect(() => {
    function onHide() {
      if (document.visibilityState === "hidden" && userTouched.current) {
        if (saveTimer.current) clearTimeout(saveTimer.current);
        if (!inFlight.current) doSave();
      }
    }
    function onBeforeUnload() {
      if (userTouched.current && !inFlight.current) doSave();
    }
    document.addEventListener("visibilitychange", onHide);
    window.addEventListener("beforeunload", onBeforeUnload);
    return () => {
      document.removeEventListener("visibilitychange", onHide);
      window.removeEventListener("beforeunload", onBeforeUnload);
    };
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  // Wrap close to flush any pending save first.
  async function safeClose() {
    if (flushRef.current) await flushRef.current();
    onClose();
  }

  const allStudents = useMemo(() => {
    const arr = [];
    working.groups.forEach((g) => {
      (students[g] || []).forEach((s) => {
        const rec = working.attendance[s.id] || { present: false, grade: null, comment: "" };
        arr.push({ id: s.id, name: s.name, group: g, ...rec });
      });
    });
    return arr;
  }, [working]);

  const filtered = useMemo(() => {
    return allStudents.filter((s) => {
      if (search.trim() && !s.name.toLowerCase().includes(search.trim().toLowerCase())) return false;
      if (filter === "present") return s.present;
      if (filter === "absent") return !s.present;
      if (filter === "unmarked") return s.grade == null;
      return true;
    });
  }, [allStudents, filter, search]);

  function update(id, patch) {
    userTouched.current = true;
    setWorking((w) => ({
      ...w,
      attendance: { ...w.attendance, [id]: { ...w.attendance[id], ...patch } },
    }));
  }

  function setAllPresent(val) {
    userTouched.current = true;
    setWorking((w) => {
      const att = { ...w.attendance };
      Object.keys(att).forEach((id) => { att[id] = { ...att[id], present: val }; });
      return { ...w, attendance: att };
    });
  }

  async function handleSaveClick() {
    if (saveTimer.current) clearTimeout(saveTimer.current);
    userTouched.current = true;
    await doSave();
  }

  const presentCount = allStudents.filter((s) => s.present).length;
  const gradeCount = allStudents.filter((s) => s.grade != null && s.grade !== "").length;
  const grades = allStudents.filter((s) => s.grade != null && s.grade !== "").map((s) => Number(s.grade));
  const avgGrade = grades.length ? grades.reduce((a, b) => a + b, 0) / grades.length : null;

  return (
    <div className="space-y-6">
      <div>
        <button onClick={safeClose}
          className="text-xs uppercase tracking-wider hover:underline mb-3" style={{ color: C.accent }}>
          ← Retour
        </button>
        <div className="flex items-end justify-between flex-wrap gap-4">
          <div>
            <div className="text-xs uppercase tracking-[0.2em] mb-2" style={{ color: C.accent }}>
              {isNew && saveStatus === "idle" ? "Nouvelle séance" : "Édition de séance"}
            </div>
            <h1 className="font-display text-3xl" style={{ color: C.ink }}>
              {groupsLabel(working.groups)} · {working.room}
            </h1>
            <div className="text-sm mt-1" style={{ color: C.inkSoft }}>
              {fmtDate(new Date(working.date))} · {working.slot} · enseignant : {working.teacher || teacher}
            </div>
          </div>
          <div className="flex gap-2 items-center">
            <SaveStatusBadge status={saveStatus} />
            {!isNew && (
              <button onClick={onDelete}
                className="flex items-center gap-2 px-3 py-2 text-sm hover:opacity-80"
                style={{ background: C.paper, border: `1px solid ${C.absent}`, color: C.absent }}>
                <Trash2 size={14} /> Supprimer
              </button>
            )}
            <button onClick={handleSaveClick}
              disabled={saveStatus === "saving"}
              className="flex items-center gap-2 px-4 py-2 text-sm font-medium hover:opacity-90"
              style={{
                background: C.paper,
                border: `1px solid ${C.ink}`,
                color: C.ink,
              }}>
              <Save size={14} /> Forcer l'enregistrement
            </button>
          </div>
        </div>
      </div>

      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
        <Stat label="Effectif" value={allStudents.length} sub={groupsLabel(working.groups)} />
        <Stat label="Présents" value={presentCount}
          sub={`${((presentCount / allStudents.length) * 100).toFixed(0)}% de l'effectif`} />
        <Stat label="Notes saisies" value={`${gradeCount}/${allStudents.length}`}
          sub={gradeCount === allStudents.length ? "Complet" : "À compléter"} />
        <Stat label="Moyenne séance" value={avgGrade != null ? avgGrade.toFixed(2) : "—"}
          sub="sur 20" />
      </div>

      <div className="flex flex-wrap items-center gap-2 p-3"
        style={{ background: C.paper, border: `1px solid ${C.rule}` }}>
        <button onClick={() => setAllPresent(true)}
          className="px-3 py-1.5 text-xs hover:opacity-80"
          style={{ background: C.presentSoft, color: C.present, border: `1px solid ${C.present}` }}>
          ✓ Tous présents
        </button>
        <button onClick={() => setAllPresent(false)}
          className="px-3 py-1.5 text-xs hover:opacity-80"
          style={{ background: C.absentSoft, color: C.absent, border: `1px solid ${C.absent}` }}>
          ✗ Tous absents
        </button>
        <div className="h-6 w-px mx-1" style={{ background: C.rule }} />
        <Filter size={14} style={{ color: C.inkMuted }} />
        {[
          { id: "all", label: "Tous" },
          { id: "present", label: "Présents" },
          { id: "absent", label: "Absents" },
          { id: "unmarked", label: "Sans note" },
        ].map((f) => (
          <button key={f.id} onClick={() => setFilter(f.id)}
            className="px-3 py-1.5 text-xs"
            style={{
              background: filter === f.id ? C.ink : "transparent",
              color: filter === f.id ? C.bg : C.inkSoft,
              border: `1px solid ${filter === f.id ? C.ink : C.rule}`,
            }}>
            {f.label}
          </button>
        ))}
        <input value={search} onChange={(e) => setSearch(e.target.value)}
          placeholder="Filtrer un nom…"
          className="ml-auto px-3 py-1.5 text-xs outline-none"
          style={{ background: C.bg, border: `1px solid ${C.rule}`, color: C.ink, minWidth: 180 }} />
      </div>

      <div style={{ background: C.paper, border: `1px solid ${C.rule}` }}>
        <table className="w-full text-sm">
          <thead>
            <tr style={{ background: C.bg, borderBottom: `1px solid ${C.rule}` }}>
              <th className="text-left px-4 py-3 text-xs uppercase tracking-wider font-medium"
                style={{ color: C.inkMuted, width: 60 }}>N°</th>
              <th className="text-left px-4 py-3 text-xs uppercase tracking-wider font-medium"
                style={{ color: C.inkMuted }}>Étudiant</th>
              <th className="text-center px-4 py-3 text-xs uppercase tracking-wider font-medium"
                style={{ color: C.inkMuted, width: 180 }}>Présence</th>
              <th className="text-center px-4 py-3 text-xs uppercase tracking-wider font-medium"
                style={{ color: C.inkMuted, width: 130 }}>Note /20</th>
            </tr>
          </thead>
          <tbody>
            {filtered.map((s, i) => (
              <tr key={s.id} style={{ borderTop: i > 0 ? `1px solid ${C.ruleSoft}` : "none" }}>
                <td className="px-4 py-3 text-xs num" style={{ color: C.inkMuted }}>{s.id}</td>
                <td className="px-4 py-3" style={{ color: C.ink }}>
                  <div className="font-medium">{s.name}</div>
                  {working.groups.length > 1 && (
                    <div className="text-[10px]" style={{ color: C.inkMuted }}>Groupe {s.group}</div>
                  )}
                </td>
                <td className="px-4 py-3 text-center">
                  <div className="inline-flex">
                    <button
                      onClick={() => update(s.id, { present: true })}
                      className="px-3 py-1.5 text-xs flex items-center gap-1"
                      style={{
                        background: s.present ? C.present : "transparent",
                        color: s.present ? "white" : C.inkSoft,
                        border: `1px solid ${s.present ? C.present : C.rule}`,
                      }}>
                      <Check size={12} /> Présent
                    </button>
                    <button
                      onClick={() => update(s.id, { present: false })}
                      className="px-3 py-1.5 text-xs flex items-center gap-1 -ml-px"
                      style={{
                        background: !s.present ? C.absent : "transparent",
                        color: !s.present ? "white" : C.inkSoft,

                      }}>
                      <XIcon size={12} /> Absent
                    </button>
                  </div>
                </td>
                <td className="px-4 py-3 text-center">
                  <input

                    }}

                    className="w-20 px-2 py-1.5 text-center text-sm num outline-none"

                      background: s.present ? C.bg : C.ruleSoft,

                </td>
              </tr>
            ))}
            {filtered.length === 0 && (
              <tr>
                <td colSpan={4} className="text-center py-8 text-sm" style={{ color: C.inkMuted }}>
                  Aucun étudiant ne correspond à ces filtres.
                </td>
              </tr>
            )}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function GroupsView({ sessions }) {
  const { students, addStudents, updateStudent, removeStudent, addGroup, removeGroup } = useStudents();
  const groupList = listGroups(students);
  const totalStudents = countTotal(students);
  const [openGroup, setOpenGroup] = useState(null);
  const [editing, setEditing] = useState(false);
  const [showNewGroup, setShowNewGroup] = useState(false);

  // compute per-group stats
  const stats = useMemo(() => {
    const out = {};
    groupList.forEach((g) => {
      out[g] = { sessions: 0, recordsPresent: 0, recordsTotal: 0, grades: [] };
      (students[g] || []).forEach((s) => {
        out[g][s.id] = { presents: 0, absents: 0, grades: [] };
      });
    });
    sessions.forEach((s) => {
      s.groups.forEach((g) => {
        if (!out[g]) return;
        out[g].sessions += 1;
        (students[g] || []).forEach((stu) => {
          const rec = s.attendance[stu.id];
          if (!rec) return;
          out[g].recordsTotal += 1;
          if (rec.present) {
            out[g].recordsPresent += 1;
            out[g][stu.id].presents += 1;
            if (rec.grade != null && !isNaN(rec.grade)) {
              out[g].grades.push(Number(rec.grade));
              out[g][stu.id].grades.push(Number(rec.grade));
            }
          } else {
            out[g][stu.id].absents += 1;
          }
        });
      });
    });
    return out;
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [sessions, students]);

  function sessionsUsing(groupId) {
    return sessions.filter((s) => s.groups.includes(Number(groupId))).length;
  }

  if (openGroup != null) {
    const g = openGroup;
    const gs = stats[g] || { sessions: 0, recordsPresent: 0, recordsTotal: 0, grades: [] };
    const groupStudents = students[g] || [];
    const sessionsCount = sessionsUsing(g);

    return (
      <div className="space-y-6">
        <button onClick={() => { setOpenGroup(null); setEditing(false); }}
          className="text-xs uppercase tracking-wider hover:underline" style={{ color: C.accent }}>
          ← Retour aux groupes
        </button>
        <div className="flex items-end justify-between flex-wrap gap-4">
          <div>
            <div className="text-xs uppercase tracking-[0.2em] mb-2" style={{ color: C.accent }}>
              {editing ? "Modification du groupe" : "Détail du groupe"}
            </div>
            <h1 className="font-display text-3xl" style={{ color: C.ink }}>
              Groupe {g} <span className="num text-2xl" style={{ color: C.inkMuted }}>· {groupStudents.length} étudiant{groupStudents.length > 1 ? "s" : ""}</span>
            </h1>
          </div>
          <div className="flex gap-2">
            {!editing ? (
              <>
                <button onClick={() => setEditing(true)}
                  className="flex items-center gap-2 px-4 py-2 text-sm font-medium hover:opacity-80"
                  style={{ background: C.paper, border: `1px solid ${C.ink}`, color: C.ink }}>
                  ✎ Modifier la liste
                </button>
                {sessionsCount === 0 && (
                  <button onClick={() => {
                    if (window.confirm(`Supprimer définitivement le Groupe ${g} et ses ${groupStudents.length} étudiant(s) ?`)) {
                      removeGroup(g);
                      setOpenGroup(null);
                    }
                  }}
                    className="flex items-center gap-2 px-4 py-2 text-sm font-medium hover:opacity-80"
                    style={{ background: C.paper, border: `1px solid ${C.absent}`, color: C.absent }}>
                    <Trash2 size={14} /> Supprimer le groupe
                  </button>
                )}
              </>
            ) : (
              <button onClick={() => setEditing(false)}
                className="flex items-center gap-2 px-4 py-2 text-sm font-medium text-white hover:opacity-90"
                style={{ background: C.present }}>
                ✓ Terminer
              </button>
            )}
          </div>
        </div>

        {editing ? (
          <GroupEditor
            groupId={g}
            students={groupStudents}
            onAdd={(names) => addStudents(g, names)}
            onUpdate={(id, name) => updateStudent(g, id, name)}
            onRemove={(id) => {
              const used = sessions.some((s) => s.attendance[id]);
              const msg = used
                ? `Cet étudiant apparaît dans des séances déjà saisies. Le supprimer rendra ces enregistrements orphelins (mais conservés). Continuer ?`
                : `Supprimer définitivement cet étudiant ?`;
              if (window.confirm(msg)) removeStudent(g, id);
            }}
          />
        ) : (
          <>
            <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
              <Stat label="Séances" value={gs.sessions} sub="enregistrées" />
              <Stat label="Présence moyenne"
                value={gs.recordsTotal ? ((gs.recordsPresent / gs.recordsTotal) * 100).toFixed(1) + "%" : "—"}
                sub={`${gs.recordsPresent}/${gs.recordsTotal}`} />
              <Stat label="Moyenne du groupe"
                value={gs.grades.length ? (gs.grades.reduce((a, b) => a + b, 0) / gs.grades.length).toFixed(2) : "—"}
                sub={`${gs.grades.length} notes`} />
              <Stat label="Notes saisies" value={gs.grades.length} sub="au total" />
            </div>

            <div style={{ background: C.paper, border: `1px solid ${C.rule}` }}>
              <table className="w-full text-sm">
                <thead>
                  <tr style={{ background: C.bg, borderBottom: `1px solid ${C.rule}` }}>
                    <th className="text-left px-4 py-3 text-xs uppercase tracking-wider font-medium" style={{ color: C.inkMuted, width: 60 }}>N°</th>
                    <th className="text-left px-4 py-3 text-xs uppercase tracking-wider font-medium" style={{ color: C.inkMuted }}>Étudiant</th>
                    <th className="text-right px-4 py-3 text-xs uppercase tracking-wider font-medium" style={{ color: C.inkMuted }}>Présences</th>
                    <th className="text-right px-4 py-3 text-xs uppercase tracking-wider font-medium" style={{ color: C.inkMuted }}>Absences</th>
                    <th className="text-right px-4 py-3 text-xs uppercase tracking-wider font-medium" style={{ color: C.inkMuted }}>Moyenne /20</th>
                  </tr>
                </thead>
                <tbody>
                  {groupStudents.map((stu, i) => {
                    const sStats = gs[stu.id] || { presents: 0, absents: 0, grades: [] };
                    const avg = sStats.grades.length ? (sStats.grades.reduce((a, b) => a + b, 0) / sStats.grades.length) : null;
                    return (
                      <tr key={stu.id} style={{ borderTop: i > 0 ? `1px solid ${C.ruleSoft}` : "none" }}>
                        <td className="px-4 py-2 text-xs num" style={{ color: C.inkMuted }}>{i + 1}</td>
                        <td className="px-4 py-2 font-medium" style={{ color: C.ink }}>{stu.name}</td>
                        <td className="px-4 py-2 text-right num" style={{ color: C.present }}>{sStats.presents}</td>
                        <td className="px-4 py-2 text-right num" style={{ color: C.absent }}>{sStats.absents}</td>
                        <td className="px-4 py-2 text-right num font-medium" style={{ color: C.ink }}>
                          {avg != null ? avg.toFixed(2) : "—"}
                        </td>
                      </tr>
                    );
                  })}
                  {groupStudents.length === 0 && (
                    <tr>
                      <td colSpan={5} className="text-center py-8 text-sm" style={{ color: C.inkMuted }}>
                        Aucun étudiant. Cliquez « Modifier la liste » pour en ajouter.
                      </td>
                    </tr>
                  )}
                </tbody>
              </table>
            </div>
          </>
        )}
      </div>
    );
  }

  return (
    <div className="space-y-6">
      <div className="flex items-end justify-between flex-wrap gap-4">
        <div>
          <div className="text-xs uppercase tracking-[0.2em] mb-2" style={{ color: C.accent }}>
            Liste des groupes
          </div>
          <h1 className="font-display text-3xl" style={{ color: C.ink }}>
            {groupList.length} groupes · {totalStudents} étudiants
          </h1>
        </div>
        <button onClick={() => setShowNewGroup(true)}
          className="flex items-center gap-2 px-4 py-2 text-sm font-medium text-white hover:opacity-90"
          style={{ background: C.accent }}>
          <Plus size={14} /> Nouveau groupe
        </button>
      </div>

      <DuplicatesPanel onJump={(g) => setOpenGroup(g)} />

      <div className="grid sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-3">
        {groupList.map((g) => {
          const gs = stats[g];
          const avg = gs.grades.length ? (gs.grades.reduce((a, b) => a + b, 0) / gs.grades.length) : null;
          const presence = gs.recordsTotal ? (gs.recordsPresent / gs.recordsTotal) * 100 : null;
          return (
            <button key={g} onClick={() => setOpenGroup(g)}
              className="text-left p-5 hover:opacity-90 transition"
              style={{ background: C.paper, border: `1px solid ${C.rule}` }}>
              <div className="flex items-baseline justify-between mb-3">
                <div className="font-display text-2xl" style={{ color: C.ink }}>Groupe {g}</div>
                <div className="text-xs num" style={{ color: C.inkMuted }}>{(students[g] || []).length} étud.</div>
              </div>
              <div className="space-y-1 text-xs">
                <div className="flex justify-between" style={{ color: C.inkSoft }}>
                  <span>Séances</span>
                  <span className="num font-medium">{gs.sessions}</span>
                </div>
                <div className="flex justify-between" style={{ color: C.inkSoft }}>
                  <span>Présence</span>
                  <span className="num font-medium">{presence != null ? presence.toFixed(0) + "%" : "—"}</span>
                </div>
                <div className="flex justify-between" style={{ color: C.inkSoft }}>
                  <span>Moyenne</span>
                  <span className="num font-medium">{avg != null ? avg.toFixed(2) : "—"}</span>
                </div>
              </div>
            </button>
          );
        })}
      </div>

      {showNewGroup && (
        <NewGroupModal
          suggestedId={nextGroupId(students)}
          existingIds={groupList}
          students={students}
          onClose={() => setShowNewGroup(false)}
          onCreate={async (id, names) => {
            await addGroup(id, names);
            setShowNewGroup(false);
            setOpenGroup(id);
          }}
        />
      )}
    </div>
  );
}

/* ============================================================
   COMPONENT — GroupEditor (in-place edit of student list)
   ============================================================ */
function GroupEditor({ groupId, students, onAdd, onUpdate, onRemove }) {
  const [single, setSingle] = useState("");
  const [bulk, setBulk] = useState("");
  const [showBulk, setShowBulk] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [editingValue, setEditingValue] = useState("");
  const [feedback, setFeedback] = useState(null); // { kind: 'success'|'error'|'partial', text }
  const [editError, setEditError] = useState(null);

  function showFeedback(kind, text, ms = 4500) {
    setFeedback({ kind, text });
    setTimeout(() => setFeedback(null), ms);
  }

  function describeRejected(rejected) {
    return rejected
      .map((r) => `« ${r.name} » (déjà dans Groupe ${r.conflictsWith.group} sous « ${r.conflictsWith.name} »)`)
      .join(" · ");
  }

  async function addOne() {
    const v = single.trim();
    if (!v) return;
    const res = await onAdd([v]);
    if (res.added.length === 1) {
      setSingle("");
      showFeedback("success", `« ${v} » ajouté.`);
    } else if (res.rejected.length) {
      const r = res.rejected[0];
      showFeedback("error",
        `Impossible d'ajouter « ${r.name} » : déjà inscrit dans le Groupe ${r.conflictsWith.group} sous « ${r.conflictsWith.name} ».`);
    }
  }

  async function addBulk() {
    const names = bulk.split("\n").map((s) => s.trim()).filter(Boolean);
    if (names.length === 0) return;
    const res = await onAdd(names);
    if (res.added.length && !res.rejected.length) {
      showFeedback("success", `${res.added.length} étudiant(s) ajouté(s).`);
      setBulk("");
      setShowBulk(false);
    } else if (res.added.length && res.rejected.length) {
      showFeedback("partial",
        `${res.added.length} ajouté(s), ${res.rejected.length} rejeté(s) : ${describeRejected(res.rejected)}`,
        9000);
      // Keep rejected lines in the textarea so user can see/correct
      setBulk(res.rejected.map((r) => r.name).join("\n"));
    } else if (res.rejected.length) {
      showFeedback("error",
        `Aucun ajouté. Doublon(s) : ${describeRejected(res.rejected)}`,
        9000);
    }
  }

  function startEdit(s) {
    setEditingId(s.id);
    setEditingValue(s.name);
    setEditError(null);
  }
  async function commitEdit() {
    const v = editingValue.trim();
    if (!v) { setEditingId(null); setEditError(null); return; }
    const res = await onUpdate(editingId, v);
    if (res.ok) {
      setEditingId(null);
      setEditingValue("");
      setEditError(null);
    } else if (res.conflict) {
      setEditError(`Ce nom existe déjà dans le Groupe ${res.conflict.group} (« ${res.conflict.name} »).`);
    } else {
      setEditError("Nom invalide.");
    }
  }

  return (
    <div className="space-y-4">
      <div className="p-4" style={{ background: C.warnSoft, border: `1px solid ${C.warn}`, color: C.ink }}>
        <div className="text-xs flex items-start gap-2">
          <AlertCircle size={14} style={{ color: C.warn, marginTop: 2 }} />
          <div>
            Mode modification actif. Les changements sont enregistrés instantanément et partagés avec tous les enseignants.
            Un même étudiant ne peut pas être inscrit dans deux groupes — les doublons sont détectés et bloqués automatiquement (les variations d'accents, tirets et apostrophes sont prises en compte).
            Supprimer un étudiant qui a déjà des notes/présences ne supprime pas ses anciennes données — elles deviennent simplement inaccessibles.
          </div>
        </div>
      </div>

      {feedback && (
        <div className="p-3 text-xs flex items-start gap-2"
          style={{
            background: feedback.kind === "success" ? C.presentSoft
                       : feedback.kind === "partial" ? C.warnSoft
                       : C.absentSoft,
            border: `1px solid ${
              feedback.kind === "success" ? C.present
              : feedback.kind === "partial" ? C.warn
              : C.absent
            }`,
            color: C.ink,
          }}>
          <span style={{ marginTop: 1 }}>
            {feedback.kind === "success" ? "✓" : feedback.kind === "partial" ? "⚠" : "✗"}
          </span>
          <span>{feedback.text}</span>
        </div>
      )}

      <div className="p-5 space-y-3" style={{ background: C.paper, border: `1px solid ${C.rule}` }}>
        <div className="text-xs uppercase tracking-wider" style={{ color: C.inkMuted }}>
          Ajouter un étudiant
        </div>
        <div className="flex gap-2">
          <input value={single} onChange={(e) => setSingle(e.target.value)}
            onKeyDown={(e) => { if (e.key === "Enter") addOne(); }}
            placeholder="NOM Prénoms (ex. KOUASSI JEAN-PIERRE)"
            className="flex-1 px-4 py-2 text-sm outline-none"
            style={{ background: C.bg, border: `1px solid ${C.rule}`, color: C.ink }} />
          <button onClick={addOne}
            className="flex items-center gap-1 px-4 py-2 text-sm font-medium text-white hover:opacity-90"
            style={{ background: C.accent }}>
            <Plus size={14} /> Ajouter
          </button>
          <button onClick={() => setShowBulk((v) => !v)}
            className="px-3 py-2 text-sm hover:opacity-80"
            style={{ background: C.paper, border: `1px solid ${C.rule}`, color: C.ink }}>
            {showBulk ? "Annuler" : "Liste en lot…"}
          </button>
        </div>

        {showBulk && (
          <div className="space-y-2 pt-2" style={{ borderTop: `1px solid ${C.ruleSoft}` }}>
            <div className="text-xs" style={{ color: C.inkMuted }}>
              Collez une liste — un nom par ligne. Les espaces multiples et lignes vides sont nettoyés automatiquement.
            </div>
            <textarea value={bulk} onChange={(e) => setBulk(e.target.value)}
              placeholder={"DUPONT MARIE\nMARTIN JEAN PAUL\nKONE FATOU AICHA"}
              rows={6}
              className="w-full px-3 py-2 text-sm outline-none num"
              style={{ background: C.bg, border: `1px solid ${C.rule}`, color: C.ink, fontFamily: "ui-monospace, monospace" }} />
            <div className="flex justify-end">
              <button onClick={addBulk}
                className="px-4 py-2 text-sm font-medium text-white hover:opacity-90"
                style={{ background: C.accent }}>
                Ajouter {bulk.split("\n").filter((s) => s.trim()).length} étudiant(s)
              </button>
            </div>
          </div>
        )}
      </div>

      <div style={{ background: C.paper, border: `1px solid ${C.rule}` }}>
        <table className="w-full text-sm">
          <thead>
            <tr style={{ background: C.bg, borderBottom: `1px solid ${C.rule}` }}>
              <th className="text-left px-4 py-3 text-xs uppercase tracking-wider font-medium" style={{ color: C.inkMuted, width: 60 }}>N°</th>
              <th className="text-left px-4 py-3 text-xs uppercase tracking-wider font-medium" style={{ color: C.inkMuted }}>Étudiant</th>
              <th className="text-left px-4 py-3 text-xs uppercase tracking-wider font-medium" style={{ color: C.inkMuted, width: 90 }}>ID</th>
              <th style={{ width: 180 }}></th>
            </tr>
          </thead>
          <tbody>
            {students.map((s, i) => (
              <tr key={s.id} style={{ borderTop: i > 0 ? `1px solid ${C.ruleSoft}` : "none" }}>
                <td className="px-4 py-2 text-xs num" style={{ color: C.inkMuted }}>{i + 1}</td>
                <td className="px-4 py-2" style={{ color: C.ink }}>
                  {editingId === s.id ? (
                    <div>
                      <input value={editingValue} onChange={(e) => setEditingValue(e.target.value)}
                        onKeyDown={(e) => { if (e.key === "Enter") commitEdit(); if (e.key === "Escape") { setEditingId(null); setEditingValue(""); setEditError(null); } }}
                        autoFocus
                        className="w-full px-2 py-1 text-sm outline-none"
                        style={{ background: C.bg, border: `1px solid ${editError ? C.absent : C.accent}`, color: C.ink }} />
                      {editError && (
                        <div className="text-xs mt-1" style={{ color: C.absent }}>{editError}</div>
                      )}
                    </div>
                  ) : (
                    <span className="font-medium">{s.name}</span>
                  )}
                </td>
                <td className="px-4 py-2 text-xs num" style={{ color: C.inkMuted }}>{s.id}</td>
                <td className="px-2 py-2 text-right">
                  {editingId === s.id ? (
                    <div className="flex justify-end gap-1">
                      <button onClick={commitEdit}
                        className="px-2 py-1 text-xs text-white" style={{ background: C.present }}>OK</button>
                      <button onClick={() => { setEditingId(null); setEditingValue(""); setEditError(null); }}
                        className="px-2 py-1 text-xs" style={{ background: C.paper, border: `1px solid ${C.rule}`, color: C.inkSoft }}>×</button>
                    </div>
                  ) : (
                    <div className="flex justify-end gap-1">
                      <button onClick={() => startEdit(s)}
                        className="px-2 py-1 text-xs hover:opacity-70"
                        style={{ background: C.paper, border: `1px solid ${C.rule}`, color: C.inkSoft }}>
                        ✎
                      </button>
                      <button onClick={() => onRemove(s.id)}
                        className="px-2 py-1 text-xs hover:opacity-70"
                        style={{ background: C.paper, border: `1px solid ${C.absent}`, color: C.absent }}>
                        <Trash2 size={11} />
                      </button>
                    </div>
                  )}
                </td>
              </tr>
            ))}
            {students.length === 0 && (
              <tr>
                <td colSpan={4} className="text-center py-8 text-sm" style={{ color: C.inkMuted }}>
                  Le groupe est vide.
                </td>
              </tr>
            )}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ============================================================
   COMPONENT — NewGroupModal
   ============================================================ */
function NewGroupModal({ suggestedId, existingIds, students, onClose, onCreate }) {
  const [groupId, setGroupId] = useState(String(suggestedId));
  const [bulk, setBulk] = useState("");
  const [creating, setCreating] = useState(false);

  const id = parseInt(groupId, 10);
  const idValid = !isNaN(id) && id > 0 && !existingIds.includes(id);
  const names = bulk.split("\n").map((s) => s.trim()).filter(Boolean);

  // Pre-validate names against existing students to give immediate feedback
  const conflicts = useMemo(() => {
    const out = [];
    const seenInBatch = new Set();
    names.forEach((name) => {
      const key = normalizeName(name);
      if (seenInBatch.has(key)) {
        out.push({ name, reason: "doublon dans la liste collée" });
        return;
      }
      seenInBatch.add(key);
      const conflict = findStudentByName(students, name);
      if (conflict) out.push({ name, reason: `dans Groupe ${conflict.group} sous « ${conflict.name} »` });
    });
    return out;
  }, [names, students]);

  const validCount = names.length - conflicts.length;

  async function handleCreate() {
    if (!idValid) return;
    setCreating(true);
    await onCreate(id, names);
  }

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4"
      style={{ background: "rgba(27, 42, 65, 0.55)" }}
      onClick={onClose}>
      <div className="max-w-lg w-full p-6 space-y-4"
        style={{ background: C.paper, border: `1px solid ${C.rule}` }}
        onClick={(e) => e.stopPropagation()}>
        <div>
          <div className="text-xs uppercase tracking-[0.2em] mb-1" style={{ color: C.accent }}>
            Création
          </div>
          <h2 className="font-display text-2xl" style={{ color: C.ink }}>Nouveau groupe</h2>
        </div>

        <div>
          <label className="text-xs uppercase tracking-wider mb-2 block" style={{ color: C.inkMuted }}>
            Numéro du groupe
          </label>
          <input type="number" min="1" value={groupId}
            onChange={(e) => setGroupId(e.target.value)}
            className="w-full px-3 py-2 text-sm outline-none num"
            style={{ background: C.bg, border: `1px solid ${idValid ? C.rule : C.absent}`, color: C.ink }} />
          {!idValid && (
            <div className="text-xs mt-1" style={{ color: C.absent }}>
              {existingIds.includes(id) ? `Le Groupe ${id} existe déjà.` : "Numéro invalide."}
            </div>
          )}
        </div>

        <div>
          <label className="text-xs uppercase tracking-wider mb-2 block" style={{ color: C.inkMuted }}>
            Étudiants (optionnel — un nom par ligne)
          </label>
          <textarea value={bulk} onChange={(e) => setBulk(e.target.value)}
            rows={8}
            placeholder={"NOM Prénoms\nNOM Prénoms\n…\n\n(vous pourrez aussi en ajouter après)"}
            className="w-full px-3 py-2 text-sm outline-none"
            style={{ background: C.bg, border: `1px solid ${C.rule}`, color: C.ink, fontFamily: "ui-monospace, monospace" }} />
          <div className="text-xs mt-1 flex items-center justify-between" style={{ color: C.inkMuted }}>
            <span>{names.length} étudiant{names.length > 1 ? "s" : ""} détecté{names.length > 1 ? "s" : ""}</span>
            {conflicts.length > 0 && (
              <span style={{ color: C.warn }}>
                {conflicts.length} doublon{conflicts.length > 1 ? "s" : ""} sera{conflicts.length > 1 ? "ont" : ""} ignoré{conflicts.length > 1 ? "s" : ""}
              </span>
            )}
          </div>
          {conflicts.length > 0 && (
            <div className="mt-2 p-3 text-xs space-y-1"
              style={{ background: C.warnSoft, border: `1px solid ${C.warn}`, color: C.ink, maxHeight: 140, overflowY: "auto" }}>
              {conflicts.slice(0, 8).map((c, i) => (
                <div key={i}>· « {c.name} » — {c.reason}</div>
              ))}
              {conflicts.length > 8 && (
                <div className="italic" style={{ color: C.inkMuted }}>… et {conflicts.length - 8} autre(s)</div>
              )}
            </div>
          )}
        </div>

        <div className="flex justify-end gap-2 pt-2">
          <button onClick={onClose}
            className="px-4 py-2 text-sm hover:opacity-80"
            style={{ background: C.paper, border: `1px solid ${C.rule}`, color: C.ink }}>
            Annuler
          </button>
          <button onClick={handleCreate}
            disabled={!idValid || creating}
            className="px-5 py-2 text-sm font-medium text-white hover:opacity-90 disabled:opacity-40"
            style={{ background: C.accent }}>
            Créer le Groupe {idValid ? id : "?"} {names.length > 0 && `(${validCount} étud.)`}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   COMPONENT — DuplicatesPanel
   ============================================================ */
function DuplicatesPanel({ onJump }) {
  const { students, removeStudent } = useStudents();
  const [open, setOpen] = useState(false);
  const dups = useMemo(() => findCrossGroupDuplicates(students), [students]);

  if (dups.length === 0) return null;

  return (
    <div style={{ background: C.warnSoft, border: `1px solid ${C.warn}` }}>
      <button onClick={() => setOpen((v) => !v)}
        className="w-full px-5 py-3 text-left flex items-center justify-between hover:opacity-80">
        <div className="flex items-center gap-3">
          <AlertCircle size={18} style={{ color: C.warn }} />
          <div>
            <div className="text-sm font-medium" style={{ color: C.ink }}>
              {dups.length} étudiant{dups.length > 1 ? "s" : ""} apparaît dans plusieurs groupes
            </div>
            <div className="text-xs" style={{ color: C.inkSoft }}>
              Détecté dans la liste source — un même étudiant ne devrait être inscrit que dans un seul groupe.
              Supprimez les inscriptions en double pour rétablir l'unicité.
            </div>
          </div>
        </div>
        <ChevronRight size={16} style={{ color: C.inkMuted, transform: open ? "rotate(90deg)" : "none", transition: "transform 0.15s" }} />
      </button>

      {open && (
        <div style={{ borderTop: `1px solid ${C.warn}`, background: C.paper }}>
          <div className="divide-y" style={{ borderColor: C.ruleSoft }}>
            {dups.map((d, i) => (
              <div key={i} className="px-5 py-3">
                <div className="text-sm font-medium mb-2" style={{ color: C.ink }}>
                  {d.occurrences[0].name}
                </div>
                <div className="flex flex-wrap gap-2">
                  {d.occurrences.map((o) => (
                    <div key={o.id} className="flex items-center gap-1 px-2 py-1 text-xs"
                      style={{ background: C.bg, border: `1px solid ${C.rule}` }}>
                      <button onClick={() => onJump(o.group)}
                        className="font-medium hover:underline" style={{ color: C.accent }}>
                        Groupe {o.group}
                      </button>
                      <span style={{ color: C.inkMuted }}>· {o.id}</span>
                      <button
                        onClick={() => {
                          if (window.confirm(`Supprimer « ${o.name} » du Groupe ${o.group} ? (les autres inscriptions sont conservées)`)) {
                            removeStudent(o.group, o.id);
                          }
                        }}
                        className="ml-1 hover:opacity-70"
                        title="Retirer cette inscription"
                        style={{ color: C.absent }}>
                        <Trash2 size={11} />
                      </button>
                    </div>
                  ))}
                </div>
                {d.occurrences.length > 1 && d.occurrences.some((o) => o.name !== d.occurrences[0].name) && (
                  <div className="text-xs italic mt-1" style={{ color: C.inkMuted }}>
                    Variantes orthographiques détectées : {[...new Set(d.occurrences.map((o) => o.name))].join(" / ")}
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

   COMPONENT — Search
   ============================================================ */
function StudentSearch({ sessions }) {
  const { students } = useStudents();
  const [q, setQ] = useState("");
  const allStudents = useMemo(() => {
    const arr = [];
    listGroups(students).forEach((g) => {
      (students[g] || []).forEach((s, i) => {
        arr.push({ id: s.id, name: s.name, group: g, num: i + 1 });
      });
    });
    return arr;
  }, [students]);

  const results = useMemo(() => {
    if (!q.trim()) return [];
    const f = q.trim().toLowerCase();
    return allStudents.filter((s) => s.name.toLowerCase().includes(f)).slice(0, 25);
  }, [q, allStudents]);

  function statsFor(id) {
    let p = 0, a = 0;
    const grades = [];
    sessions.forEach((s) => {
      const rec = s.attendance[id];
      if (!rec) return;
      if (rec.present) {
        p++;
        if (rec.grade != null && !isNaN(rec.grade)) grades.push(Number(rec.grade));
      } else a++;
    });
    return {
      presents: p, absents: a,
      avg: grades.length ? grades.reduce((x, y) => x + y, 0) / grades.length : null,
      gradesCount: grades.length,
    };
  }

  return (
    <div className="space-y-6">
      <div>
        <div className="text-xs uppercase tracking-[0.2em] mb-2" style={{ color: C.accent }}>
          Recherche
        </div>
        <h1 className="font-display text-3xl" style={{ color: C.ink }}>
          Rechercher un étudiant
        </h1>
      </div>

      <input value={q} onChange={(e) => setQ(e.target.value)}
        autoFocus
        placeholder="Tapez un nom ou prénom (ex. KOUASSI, AÏCHA)…"
        className="w-full px-5 py-4 text-base outline-none"
        style={{ background: C.paper, border: `1px solid ${C.rule}`, color: C.ink }} />

      {q.trim() && (
        <div className="text-xs" style={{ color: C.inkMuted }}>
          {results.length} résultat{results.length > 1 ? "s" : ""}
          {allStudents.filter((s) => s.name.toLowerCase().includes(q.toLowerCase())).length > 25 && " (limité aux 25 premiers)"}
        </div>
      )}

      <div className="space-y-2">
        {results.map((s) => {
          const st = statsFor(s.id);
          return (
            <div key={s.id} className="p-4 flex items-center justify-between flex-wrap gap-4"
              style={{ background: C.paper, border: `1px solid ${C.rule}` }}>
              <div>
                <div className="font-medium" style={{ color: C.ink }}>{s.name}</div>
                <div className="text-xs" style={{ color: C.inkMuted }}>
                  Groupe {s.group} · N°{s.num} · ID {s.id}
                </div>
              </div>
              <div className="flex gap-6 text-sm">
                <div>
                  <div className="text-[10px] uppercase tracking-wider" style={{ color: C.inkMuted }}>Présences</div>
                  <div className="num font-medium" style={{ color: C.present }}>{st.presents}</div>
                </div>
                <div>
                  <div className="text-[10px] uppercase tracking-wider" style={{ color: C.inkMuted }}>Absences</div>
                  <div className="num font-medium" style={{ color: C.absent }}>{st.absents}</div>
                </div>
                <div>
                  <div className="text-[10px] uppercase tracking-wider" style={{ color: C.inkMuted }}>Moyenne</div>
                  <div className="num font-medium" style={{ color: C.ink }}>
                    {st.avg != null ? st.avg.toFixed(2) : "—"}
                  </div>
                </div>
              </div>
            </div>
          );
        })}
        {q.trim() && results.length === 0 && (
          <div className="p-8 text-center text-sm" style={{ background: C.paper, border: `1px solid ${C.rule}`, color: C.inkMuted }}>
            Aucun étudiant trouvé.
          </div>
        )}
      </div>
    </div>
  );
}

function Exports({ sessions, onExportBackup, onRestoreBackup }) {
  const { students } = useStudents();
  const groupList = listGroups(students);
  const [groupChoice, setGroupChoice] = useState("all");
  const [printSession, setPrintSession] = useState("");
  const [restoreMsg, setRestoreMsg] = useState(null); // { kind, text }
  const fileInputRef = useRef(null);

  async function handleRestoreFile(e) {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    if (!window.confirm(
      `⚠ Restauration : toutes les données actuelles (étudiants, séances, notes) seront REMPLACÉES par le contenu de « ${file.name} ». Continuer ?`
    )) {
      e.target.value = "";
      return;
    }
    try {
      const text = await file.text();
      const summary = await onRestoreBackup(text);
      setRestoreMsg({
        kind: "success",
        text: `Restauration réussie : ${summary.groups} groupes · ${summary.students} étudiants · ${summary.sessions} séance(s) · ${summary.teachers} enseignant(s).`,
      });
    } catch (err) {
      setRestoreMsg({ kind: "error", text: `Échec : ${err.message}` });
    } finally {
      if (e.target) e.target.value = "";
      setTimeout(() => setRestoreMsg(null), 8000);
    }
  }

  function exportExcel() {
    const wb = XLSX.utils.book_new();

    // Sheet 1: Synthèse étudiants (notes & présences agrégées)
    const groupsToExport = groupChoice === "all" ? groupList : [Number(groupChoice)];
    const synthRows = [["Groupe", "N°", "Étudiant", "Séances", "Présences", "Absences", "Taux présence (%)", "Notes saisies", "Moyenne /20"]];
    groupsToExport.forEach((g) => {
      (students[g] || []).forEach((stu, i) => {
        const id = stu.id;
        let p = 0, a = 0; const grades = [];
        sessions.forEach((s) => {
          if (!s.groups.includes(g)) return;
          const r = s.attendance[id];
          if (!r) return;
          if (r.present) {
            p++;
            if (r.grade != null && !isNaN(r.grade)) grades.push(Number(r.grade));
          } else a++;
        });
        const total = p + a;
        const avg = grades.length ? grades.reduce((x, y) => x + y, 0) / grades.length : "";
        synthRows.push([
          g, i + 1, stu.name, total, p, a,
          total ? Number(((p / total) * 100).toFixed(1)) : "",
          grades.length, avg !== "" ? Number(avg.toFixed(2)) : "",
        ]);
      });
    });
    const sh1 = XLSX.utils.aoa_to_sheet(synthRows);
    sh1["!cols"] = [{ wch: 8 }, { wch: 6 }, { wch: 42 }, { wch: 10 }, { wch: 10 }, { wch: 10 }, { wch: 18 }, { wch: 14 }, { wch: 12 }];
    XLSX.utils.book_append_sheet(wb, sh1, "Synthèse");

    // Sheet 2: Toutes les séances détaillées
    const sessRows = [["Date", "Créneau", "Salle", "Groupe(s)", "Enseignant", "N°", "Étudiant", "Présent", "Note /20"]];
    [...sessions].sort((a, b) => (a.date + a.slot).localeCompare(b.date + b.slot)).forEach((s) => {
      s.groups.forEach((g) => {
        (students[g] || []).forEach((stu, i) => {
          const id = stu.id;
          const r = s.attendance[id] || {};
          sessRows.push([
            s.date, s.slot, s.room, groupsLabel(s.groups), s.teacher || "",
            i + 1, stu.name,
            r.present ? "Oui" : "Non",
            r.grade != null && !isNaN(r.grade) ? Number(r.grade) : "",
          ]);
        });
      });
    });
    const sh2 = XLSX.utils.aoa_to_sheet(sessRows);
    sh2["!cols"] = [{ wch: 12 }, { wch: 14 }, { wch: 10 }, { wch: 12 }, { wch: 18 }, { wch: 5 }, { wch: 42 }, { wch: 9 }, { wch: 10 }];
    XLSX.utils.book_append_sheet(wb, sh2, "Détail séances");

    // Sheet 3: Tableau croisé notes (étudiants × séances)
    const sortedSess = [...sessions].sort((a, b) => (a.date + a.slot).localeCompare(b.date + b.slot));
    const matrixHeaders = ["Groupe", "N°", "Étudiant", ...sortedSess.map((s) => `${fmtDateShort(new Date(s.date))} ${s.slot.split("–")[0]}`)];
    const matrixRows = [matrixHeaders];
    groupsToExport.forEach((g) => {
      (students[g] || []).forEach((stu, i) => {
        const id = stu.id;
        const row = [g, i + 1, stu.name];
        sortedSess.forEach((s) => {
          if (!s.groups.includes(g)) { row.push(""); return; }
          const r = s.attendance[id];
          if (!r) { row.push(""); return; }
          if (!r.present) { row.push("Abs"); return; }
          row.push(r.grade != null && !isNaN(r.grade) ? Number(r.grade) : "P");
        });
        matrixRows.push(row);
      });
    });
    const sh3 = XLSX.utils.aoa_to_sheet(matrixRows);
    sh3["!cols"] = [{ wch: 8 }, { wch: 6 }, { wch: 42 }, ...sortedSess.map(() => ({ wch: 10 }))];
    XLSX.utils.book_append_sheet(wb, sh3, "Notes par séance");

    const stamp = new Date().toISOString().slice(0, 10);
    XLSX.writeFile(wb, `TPLab_export_${stamp}.xlsx`);
  }

  return (
    <div className="space-y-8">
      <div>
        <div className="text-xs uppercase tracking-[0.2em] mb-2" style={{ color: C.accent }}>
          Exports & sauvegardes
        </div>
        <h1 className="font-display text-3xl" style={{ color: C.ink }}>
          Sortir et préserver les données
        </h1>
        <p className="text-sm mt-2" style={{ color: C.inkSoft }}>
          Téléchargez vos données au format Excel ou JSON, imprimez les feuilles de présence,
          et faites des sauvegardes régulières pour ne rien perdre.
        </p>
      </div>

      <section className="p-6" style={{ background: C.warnSoft, border: `1px solid ${C.warn}` }}>
        <div className="flex items-start gap-3">
          <AlertCircle size={20} style={{ color: C.warn, marginTop: 2 }} />
          <div className="space-y-2">
            <h2 className="font-display text-lg" style={{ color: C.ink }}>Sauvegarde recommandée à la fin de chaque journée</h2>
            <p className="text-xs" style={{ color: C.ink }}>
              Le stockage de cette application peut être effacé si elle est rechargée dans un contexte différent.
              Téléchargez régulièrement un fichier JSON de sauvegarde (ci-dessous) — il contient
              <strong> toutes</strong> vos données et peut être réimporté à tout moment.
            </p>
          </div>
        </div>
      </section>

      <div className="grid md:grid-cols-2 gap-6">
        <section className="p-6" style={{ background: C.paper, border: `1px solid ${C.rule}` }}>
          <div className="flex items-start gap-3 mb-4">
            <Save size={22} style={{ color: C.accent }} />
            <div>
              <h2 className="font-display text-xl" style={{ color: C.ink }}>Sauvegarde complète (JSON)</h2>
              <p className="text-xs mt-1" style={{ color: C.inkSoft }}>
                Étudiants · groupes · séances · notes · enseignants — dans un seul fichier réimportable.
              </p>
            </div>
          </div>

          <button onClick={onExportBackup}
            className="w-full px-4 py-3 text-sm font-medium text-white hover:opacity-90 transition"
            style={{ background: C.present }}>
            Télécharger la sauvegarde (.json)
          </button>

          <div className="mt-4 pt-4" style={{ borderTop: `1px solid ${C.ruleSoft}` }}>
            <div className="text-xs uppercase tracking-wider mb-2" style={{ color: C.inkMuted }}>
              Restaurer une sauvegarde
            </div>
            <input ref={fileInputRef}
              type="file" accept=".json,application/json"
              onChange={handleRestoreFile}
              className="hidden" />
            <button onClick={() => fileInputRef.current?.click()}
              className="w-full px-4 py-3 text-sm font-medium hover:opacity-80 transition"
              style={{ background: C.paper, border: `1px solid ${C.ink}`, color: C.ink }}>
              Choisir un fichier .json à restaurer…
            </button>
            <p className="text-xs mt-2 italic" style={{ color: C.inkMuted }}>
              Une restauration remplace toutes les données actuelles.
            </p>
            {restoreMsg && (
              <div className="mt-3 p-3 text-xs"
                style={{
                  background: restoreMsg.kind === "success" ? C.presentSoft : C.absentSoft,
                  border: `1px solid ${restoreMsg.kind === "success" ? C.present : C.absent}`,
                  color: C.ink,
                }}>
                {restoreMsg.kind === "success" ? "✓ " : "✗ "}{restoreMsg.text}
              </div>
            )}
          </div>
        </section>

        <section className="p-6" style={{ background: C.paper, border: `1px solid ${C.rule}` }}>
          <div className="flex items-start gap-3 mb-4">
            <FileSpreadsheet size={22} style={{ color: C.accent }} />
            <div>
              <h2 className="font-display text-xl" style={{ color: C.ink }}>Excel multi-feuilles</h2>
              <p className="text-xs mt-1" style={{ color: C.inkSoft }}>
                Synthèse · détail séance par séance · tableau croisé notes
              </p>
            </div>
          </div>

          <div className="mb-4">
            <label className="text-xs uppercase tracking-wider mb-2 block" style={{ color: C.inkMuted }}>
              Groupe à exporter
            </label>
            <select value={groupChoice} onChange={(e) => setGroupChoice(e.target.value)}
              className="w-full px-3 py-2 text-sm outline-none"
              style={{ background: C.bg, border: `1px solid ${C.rule}`, color: C.ink }}>
              <option value="all">Tous les groupes</option>
              {groupList.map((g) => (
                <option key={g} value={g}>Groupe {g}</option>
              ))}
            </select>
          </div>

          <button onClick={exportExcel}
            disabled={sessions.length === 0}
            className="w-full px-4 py-3 text-sm font-medium text-white hover:opacity-90 transition disabled:opacity-40"
            style={{ background: C.ink }}>
            Télécharger le classeur .xlsx
          </button>

          {sessions.length === 0 && (
            <div className="mt-3 text-xs flex items-center gap-2" style={{ color: C.warn }}>
              <AlertCircle size={12} /> Aucune séance enregistrée à exporter.
            </div>
          )}
        </section>

        <section className="p-6" style={{ background: C.paper, border: `1px solid ${C.rule}` }}>
          <div className="flex items-start gap-3 mb-4">
            <Printer size={22} style={{ color: C.accent }} />
            <div>
              <h2 className="font-display text-xl" style={{ color: C.ink }}>Feuille de présence (PDF)</h2>
              <p className="text-xs mt-1" style={{ color: C.inkSoft }}>
                Aperçu imprimable — utilisez « Enregistrer en PDF » dans la fenêtre d'impression.
              </p>
            </div>
          </div>

          <div className="mb-4">
            <label className="text-xs uppercase tracking-wider mb-2 block" style={{ color: C.inkMuted }}>
              Séance à imprimer
            </label>
            <select value={printSession} onChange={(e) => setPrintSession(e.target.value)}
              className="w-full px-3 py-2 text-sm outline-none"
              style={{ background: C.bg, border: `1px solid ${C.rule}`, color: C.ink }}>
              <option value="">— Choisir une séance —</option>
              {[...sessions].sort((a, b) => (b.date + b.slot).localeCompare(a.date + a.slot)).map((s) => (
                <option key={s.id} value={s.id}>
                  {fmtDateShort(new Date(s.date))} · {s.slot} · {s.room} · {groupsLabel(s.groups)}
                </option>
              ))}
              <option value="__blank__">Feuille vierge (pour appel manuel)</option>
            </select>
          </div>

          <button onClick={() => setPrintSession(printSession || "__blank__")}
            disabled={sessions.length === 0 && printSession !== "__blank__"}
            className="w-full px-4 py-3 text-sm font-medium hover:opacity-80 transition"
            style={{ background: C.bg, border: `1px solid ${C.ink}`, color: C.ink }}>
            Afficher l'aperçu
          </button>
        </section>
      </div>

      {printSession && (
        <PrintSheet sessionId={printSession} sessions={sessions} onClose={() => setPrintSession("")} />
      )}
    </div>
  );
}

function PrintSheet({ sessionId, sessions, onClose }) {
  const { students } = useStudents();
  const groupList = listGroups(students);
  const blank = sessionId === "__blank__";
  const [blankGroup, setBlankGroup] = useState(groupList[0] || 1);
  const session = blank ? null : sessions.find((s) => s.id === sessionId);
  const groups = blank ? [Number(blankGroup)] : (session?.groups || []);

  function handlePrint() {
    window.print();
  }

  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between flex-wrap gap-3 no-print">
        <div className="text-sm" style={{ color: C.inkSoft }}>
          {blank ? "Mode feuille vierge" : `Aperçu de la séance du ${fmtDateShort(new Date(session.date))}`}

            <select value={blankGroup} onChange={(e) => setBlankGroup(e.target.value)}

              style={{ background: C.paper, border: `1px solid ${C.rule}`, color: C.ink }}>

            className="flex items-center gap-2 px-4 py-2 text-sm font-medium text-white"

          </button>
          <button onClick={onClose}
            className="px-3 py-2 text-sm" style={{ background: C.paper, border: `1px solid ${C.rule}`, color: C.ink }}>
            Fermer
          </button>
        </div>
      </div>

      <div className="print-page p-10" style={{ background: "white", border: `1px solid ${C.rule}` }}>
        <div className="flex items-start justify-between border-b pb-4 mb-6" style={{ borderColor: "#000" }}>

            <div className="text-xs uppercase tracking-[0.18em]" style={{ color: "#555" }}>UNA · UFR-SFA · 2025-2026</div>

              Travaux Pratiques — Initiation à la Programmation (IAP2201)
            </div>
            <div className="text-sm mt-1" style={{ color: "#000" }}>
              Licence 1 Mathématiques — Informatique
            </div>
          </div>
          <div className="text-right text-sm" style={{ color: "#000" }}>
            <div className="font-medium">{groupsLabel(groups)}</div>
            {!blank && <div>{session.room} · {session.slot}</div>}
            {!blank && <div>{fmtDate(new Date(session.date))}</div>}
            {!blank && <div className="text-xs italic">Enseignant : {session.teacher || "—"}</div>}
          </div>
        </div>

        <table className="w-full text-sm" style={{ color: "#000", borderCollapse: "collapse" }}>
          <thead>
            <tr style={{ borderBottom: "1.5px solid #000" }}>
              <th className="text-left py-2 px-2" style={{ width: 40 }}>N°</th>
              <th className="text-left py-2 px-2">Nom & Prénoms</th>
              <th className="text-center py-2 px-2" style={{ width: 80 }}>Présent</th>
              <th className="text-center py-2 px-2" style={{ width: 80 }}>Note /20</th>
              <th className="text-left py-2 px-2" style={{ width: 200 }}>Signature</th>
            </tr>
          </thead>
          <tbody>
            {groups.flatMap((g) =>
              (students[g] || []).map((stu, i) => {
                const id = stu.id;
                const r = !blank ? session.attendance[id] : null;
                return (
                  <tr key={`${g}-${i}`} style={{ borderBottom: "0.5px solid #999" }}>

                  </tr>
                );

        <div className="mt-8 flex justify-between text-xs italic" style={{ color: "#000" }}>
          <div>Total effectif : {groups.reduce((s, g) => s + (students[g] || []).length, 0)} étudiant(s)</div>
          <div>Signature de l'enseignant : ____________________</div>
        </div>
      </div>
    </div>
  );
}

    try {

      setCopied(true);
      setTimeout(() => setCopied(false), 1500);
    } catch {
      // ignore (older browsers)
    }
  }

  async function handleConnect() {
    setTesting(true);
    setError("");
    try {
      await onConfigure(url.trim(), key.trim());
    } catch (e) {
      setError(e.message || String(e));
    } finally {
      setTesting(false);
    }
  }

  return (
    <div className="min-h-screen flex items-start justify-center p-6 py-12" style={{ background: C.bg }}>
      <div className="max-w-2xl w-full space-y-6">
